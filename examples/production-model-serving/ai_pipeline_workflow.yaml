name: "Production AI Pipeline"
description: |
  Demonstrates production-ready AI model serving with:
  1. Resource-aware model routing (CPU vs GPU models)
  2. Health checks and monitoring
  3. Batch processing for efficiency
  4. Multi-modal AI processing (text + vision)

  This workflow showcases how StepFlow enables:
  - Independent scaling of different model types
  - Resource optimization through intelligent routing
  - Production monitoring and observability
  - Graceful error handling and fallbacks

input:
  # User content to process
  user_text: { type: string, description: "Text content to analyze" }
  user_image: { type: string, description: "Base64 encoded image to classify", optional: true }

  # Processing configuration
  processing_mode: { type: string, enum: ["fast", "accurate", "batch"], default: "fast" }
  batch_size: { type: integer, default: 4, description: "Batch size for processing" }

  # Model selection preferences
  prefer_gpu: { type: boolean, default: false, description: "Prefer GPU models when available" }

steps:
  # Step 1: Health check both model servers
  - id: text_health_check
    component: /models/text/model_health_check
    input:
      detailed: true
    on_error:
      action: fail
      message: "Text model server unavailable"

  - id: vision_health_check
    component: /models/vision/vision_health_check
    input:
      detailed: true
    on_error:
      action: skip  # Vision is optional

  # Step 2: Analyze user input to determine optimal processing strategy
  - id: content_analysis_udf
    component: /put_blob
    input:
      data:
        input_schema:
          type: object
          properties:
            user_text:
              type: string
            user_image:
              type: string
            prefer_gpu:
              type: boolean
            processing_mode:
              type: string
        code: |
          return {
              "no_text": len(input.user_text) == 0,
              "no_image": len(input.get("user_image", None) or "") == 0,
              "prefer_gpu": input.prefer_gpu,
              "processing_mode": input.processing_mode,
              "not_fast": input.processing_mode != "fast",
              "not_batch": input.processing_mode != "batch",
              "suggested_text_model": "flan-t5-small" if input.prefer_gpu else "gpt2-small",
          }
  - id: content_analysis
    component: /python/udf
    input:
      blob_id: { $from: { step: content_analysis_udf }, path: "blob_id" }
      input: { $from: { workflow: input } }

  # Step 3: Process text content with sentiment analysis
  - id: sentiment_analysis
    component: /models/text/analyze_sentiment
    input:
      text: { $from: { workflow: input }, path: "user_text" }
      model_name: { $from: { step: content_analysis }, path: "suggested_text_model" }
    skipIf: { $from: { step: content_analysis }, path: "no_text" }

  # Step 4: Generate text response based on sentiment
  - id: text_generation
    component: /models/text/generate_text
    input:
      prompt: |
        Based on the sentiment analysis ({{ sentiment_analysis.label }} with confidence {{ sentiment_analysis.score }}),
        generate a thoughtful response to: {{ input.user_text }}
      model_name: "gpt2-small"
      max_length: 150
      temperature: 0.7
      sentiment_analysis: { $from: { step: sentiment_analysis } }
    skipIf:
      $from: { workflow: input }
      path: "not_fast"

  # Step 5: Process image if provided
  - id: image_classification
    component: /models/vision/classify_image
    input:
      image_data: { $from: { workflow: input }, path: "user_image" }
      model_name: { $from: { step: content_analysis }, path: "suggested_vision_model" }
      top_k: 5
    skipIf:
      $from: { step: content_analysis }
      path: "no_image"
    on_error:
      action: skip
      message: "Image processing failed, continuing without image analysis"

  # Step 6: Get image metrics and recommendations
  - id: image_analysis
    component: /models/vision/analyze_image_metrics
    input:
      image_data: { $from: { workflow: input }, path: "user_image" }
    skipIf:
      $from: { step: content_analysis }
      path: "no_image"

  # Step 7: Demonstrate batch processing capabilities
  - id: batch_demo
    component: /models/text/batch_process_text
    input:
      texts:
        - { $from: { workflow: input }, path: "user_text" }
        - "Additional sample text for batch processing"
        - "Another example to show batching efficiency"
      model_name: "distilbert-sentiment"
      task: "sentiment"
      batch_size: { $from: { workflow: input }, path: "batch_size" }
    skipIf:
      $from: { step: content_analysis }
      path: "not_batch"

  # Step 8: Compile comprehensive results with performance metrics
  - id: final_results
    component: /eval
    input:
      input: { $from: { workflow: input } }
      sentiment_analysis: { $from: { step: sentiment_analysis } }
      text_generation: { $from: { step: text_generation } }
      image_classification: { $from: { step: image_classification } }
      image_analysis: { $from: { step: image_analysis } }
      expression: |
        {
          "processing_summary": {
            "mode": input.processing_mode,
            "text_processed": sentiment_analysis != null,
            "image_processed": image_classification != null,
            "batch_processing_used": batch_demo != null,
            "total_processing_time_ms": (
              (sentiment_analysis ? sentiment_analysis.inference_time_ms : 0) +
              (text_generation ? text_generation.generation_time_ms : 0) +
              (image_classification ? image_classification.inference_time_ms : 0)
            )
          },
          "text_analysis": {
            "sentiment": sentiment_analysis ? sentiment_analysis.label : null,
            "confidence": sentiment_analysis ? sentiment_analysis.score : null,
            "model_used": sentiment_analysis ? sentiment_analysis.model_used : null,
            "generated_response": text_generation ? text_generation.generated_text : null
          },
          "image_analysis": {
            "classifications": image_classification ? image_classification.predictions : null,
            "image_properties": image_analysis ? {
              "dimensions": [image_analysis.width, image_analysis.height],
              "format": image_analysis.format,
              "size_bytes": image_analysis.size_bytes,
              "recommended_model": image_analysis.recommended_model
            } : null,
            "resource_tier_used": image_classification ? image_classification.resource_tier : null
          },
          "performance_metrics": {
            "text_server_status": text_health_check.status,
            "vision_server_status": vision_health_check ? vision_health_check.status : "not_checked",
            "models_loaded": {
              "text": text_health_check.loaded_models,
              "vision": vision_health_check ? vision_health_check.loaded_models : []
            },
            "batch_throughput": batch_demo ? batch_demo.throughput_texts_per_sec : null,
            "gpu_utilization": text_health_check.gpu_available || (vision_health_check && vision_health_check.gpu_memory_info != null)
          },
          "production_insights": {
            "resource_utilization": input.prefer_gpu ? "gpu_preferred" : "cpu_optimized",
            "scalability_recommendations": [
              sentiment_analysis && sentiment_analysis.inference_time_ms > 1000 ? "Consider model quantization for text processing" : null,
              image_classification && image_classification.inference_time_ms > 2000 ? "Consider GPU acceleration for vision models" : null,
              batch_demo && batch_demo.throughput_texts_per_sec < 10 ? "Increase batch size for better throughput" : null
            ] | select(. != null)
          }
        }

output:
  summary: { $from: { step: final_results }, path: "processing_summary" }
  text_results: { $from: { step: final_results }, path: "text_analysis" }
  image_results: { $from: { step: final_results }, path: "image_analysis" }
  performance: { $from: { step: final_results }, path: "performance_metrics" }
  production_insights: { $from: { step: final_results }, path: "production_insights" }