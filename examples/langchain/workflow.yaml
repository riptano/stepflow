# Example workflow demonstrating LangChain integration with StepFlow
# This showcases all three integration approaches

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "Text to analyze and process"
    numbers:
      type: array
      items:
        type: number
      description: "Numbers for mathematical operations"

output_schema:
  type: object
  properties:
    text_analysis:
      type: object
    sentiment:
      type: object
    math_results:
      type: object
    blob_processing:
      type: object

steps:
  # Approach 1: Using registry components (@server.langchain_component decorator)
  - id: analyze_text
    component: /text_analyzer
    input:
      input:
        text:
          $from:
            workflow: input
          path: text
      execution_mode: invoke

  - id: classify_sentiment
    component: /sentiment_classifier
    input:
      input:
        text:
          $from:
            workflow: input
          path: text

  - id: math_operations
    component: /math_operations
    input:
      input:
        a: 10
        b: 3

  # Approach 2: UDF-style with blobs
  - id: create_text_processor_blob
    component: /create_langchain_blob
    input:
      runnable_type: text_processor
      input_schema:
        type: object
        properties:
          text:
            type: string
        required: [text]
      output_schema:
        type: object
        properties:
          processed_text:
            type: string
          word_count:
            type: integer
          original_length:
            type: integer

  - id: execute_text_processor_udf
    component: /langchain/udf
    input:
      blob_id:
        $from:
          step: create_text_processor_blob
        path: blob_id
      input:
        text:
          $from:
            workflow: input
          path: text

  # Approach 3: Direct /langchain/invoke component demo
  # This demonstrates the capability but uses the demo component 
  # since we need the actual runnable_definition, not a blob_id
  - id: prepare_direct_langchain_demo
    component: /demo_direct_langchain
    input:
      operation: calculate_stats
      data:
        numbers:
          $from:
            workflow: input
          path: numbers

output:
  text_analysis:
    $from:
      step: analyze_text

  sentiment:
    $from:
      step: classify_sentiment

  math_results:
    $from:
      step: math_operations

  blob_processing:
    text_processor:
      $from:
        step: execute_text_processor_udf
    
  direct_component_demo:
    $from:
      step: prepare_direct_langchain_demo

test:
  cases:
    - name: basic_langchain_integration
      input:
        text: "This is a great example of LangChain integration!"
        numbers: [1, 2, 3, 4, 5]
      output:
        outcome: success
        result:
          text_analysis:
            word_count: 8
            char_count: 49
          sentiment:
            sentiment: positive
          math_results:
            sum: 13
            product: 30
            power: 1000
          blob_processing:
            text_processor:
              processed_text: "This Is A Great Example Of Langchain Integration!"
              word_count: 8
              original_length: 49
          direct_component_demo:
            operation: calculate_stats
            runnable_ready: true