        \        prompt_template = frontend_node[\"template\"][\"template\"][\"value\"\
        ]\n        custom_fields = frontend_node[\"custom_fields\"]\n        frontend_node_template\
        \ = frontend_node[\"template\"]\n        _ = process_prompt_template(\n  \
        \          template=prompt_template,\n            name=\"template\",\n   \
        \         custom_fields=custom_fields,\n            frontend_node_template=frontend_node_template,\n\
        \        )\n        return frontend_node\n\n    async def update_frontend_node(self,\
        \ new_frontend_node: dict, current_frontend_node: dict):\n        \"\"\"This\
        \ function is called after the code validation is done.\"\"\"\n        frontend_node\
        \ = await super().update_frontend_node(new_frontend_node, current_frontend_node)\n\
